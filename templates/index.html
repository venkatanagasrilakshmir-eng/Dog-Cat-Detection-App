<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Real-Time Dog vs Cat Detection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141E30,#243B55);
    overflow:hidden;
}

/* Background Glow */

body::before{
    content:'';
    position:absolute;
    width:600px;
    height:600px;
    background:rgba(0,198,255,0.2);
    border-radius:50%;
    top:-200px;
    left:-150px;
    filter:blur(80px);
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(0,114,255,0.2);
    border-radius:50%;
    bottom:-200px;
    right:-100px;
    filter:blur(80px);
}

.container{
    position:relative;
    z-index:10;
}

.card{
    width:550px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    text-align:center;
    color:white;
}

.card h1{
    font-size:32px;
    margin-bottom:10px;
    background:linear-gradient(135deg,#00C6FF,#0072FF);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.card p{
    color:#d1d1d1;
    margin-bottom:20px;
}

video{
    width:100%;
    border-radius:20px;
    border:3px solid rgba(255,255,255,0.2);
}

canvas{
    display:none;
}

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#00C6FF,#0072FF);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(0,198,255,0.6);
}

.result{
    margin-top:25px;
}

.result h2{
    color:#00E5FF;
    margin-bottom:15px;
}

.result img{
    width:250px;
    border-radius:20px;
    border:3px solid rgba(255,255,255,0.2);
}

.footer{
    margin-top:20px;
    color:#aaaaaa;
    font-size:14px;
}

.loading{
    color:#FFD700;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0.5;
    }
}

</style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🐶🐱 AI Real-Time Detection</h1>

        <p>Live Camera Detection using Machine Learning</p>

        <!-- Camera -->
        <video id="video" autoplay playsinline></video>

        <!-- Hidden Canvas -->
        <canvas id="canvas"></canvas>

        <!-- Buttons -->
        <div class="buttons">

            <button onclick="startCamera()">
                🎥 Start Camera
            </button>

            <button onclick="captureAndPredict()">
                🔍 Detect
            </button>

        </div>

        <!-- Result -->
        <div class="result" id="result">

            <h2>Waiting for Detection...</h2>

        </div>

        <div class="footer">
            Machine Learning SVM Web Application
        </div>

    </div>

</div>

<script>

const video = document.getElementById('video');

/* Start Camera */

function startCamera(){

    navigator.mediaDevices.getUserMedia({
        video:true
    })

    .then(function(stream){

        video.srcObject = stream;

    })

    .catch(function(error){

        alert("Camera access denied!");

    });

}

/* Capture and Predict */

function captureAndPredict(){

    const canvas = document.getElementById('canvas');

    const result = document.getElementById('result');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');

    ctx.drawImage(video,0,0);

    const imageData = canvas.toDataURL('image/png');

    result.innerHTML =
    `<h2 class="loading">🔄 Detecting...</h2>`;

    /* Send Image to Flask Backend */

    fetch('/predict',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            image:imageData
        })

    })

    .then(response => response.json())

    .then(data => {

        result.innerHTML = `
            <h2>${data.prediction}</h2>
            <img src="${imageData}">
        `;

    })

    .catch(error => {

        result.innerHTML =
        `<h2>❌ Detection Failed</h2>`;

    });

}

/* Auto Start */

startCamera();

</script>

</body>
</html>
