<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Real-Time Dog vs Cat Detection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141E30,#243B55);
    overflow:hidden;
}

/* Background Glow */

body::before{
    content:'';
    position:absolute;
    width:600px;
    height:600px;
    background:rgba(0,198,255,0.2);
    border-radius:50%;
    top:-200px;
    left:-150px;
    filter:blur(80px);
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(0,114,255,0.2);
    border-radius:50%;
    bottom:-200px;
    right:-100px;
    filter:blur(80px);
}

/* Main Card */

.container{
    position:relative;
    z-index:10;
}

.card{
    width:500px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    text-align:center;
    color:white;
}

/* Title */

.card h1{
    font-size:32px;
    margin-bottom:10px;
    background:linear-gradient(135deg,#00C6FF,#0072FF);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.card p{
    color:#d1d1d1;
    margin-bottom:20px;
}

/* Video */

video{
    width:100%;
    border-radius:20px;
    border:3px solid rgba(255,255,255,0.2);
    margin-top:15px;
}

/* Hidden Canvas */

canvas{
    display:none;
}

/* Buttons */

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#00C6FF,#0072FF);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(0,198,255,0.6);
}

/* Result */

.result{
    margin-top:25px;
}

.result h2{
    color:#00E5FF;
    margin-bottom:15px;
}

.result img{
    width:250px;
    border-radius:20px;
    border:3px solid rgba(255,255,255,0.2);
}

/* Footer */

.footer{
    margin-top:20px;
    color:#aaaaaa;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🐶🐱 Real-Time Detection</h1>

        <p>Live Camera Detection using AI Model</p>

        <!-- Live Camera -->
        <video id="video" autoplay playsinline></video>

        <!-- Hidden Canvas -->
        <canvas id="canvas"></canvas>

        <!-- Buttons -->
        <div class="buttons">

            <button onclick="startCamera()">
                🎥 Start Camera
            </button>

            <button onclick="captureImage()">
                📸 Detect
            </button>

        </div>

        <!-- Result -->
        <div class="result" id="result">

            <h2>Waiting for Detection...</h2>

        </div>

        <div class="footer">
            Machine Learning SVM Project
        </div>

    </div>

</div>

<script>

/* Camera Access */

const video = document.getElementById('video');

function startCamera(){

    navigator.mediaDevices.getUserMedia({
        video:true
    })

    .then(function(stream){

        video.srcObject = stream;

    })

    .catch(function(error){

        alert("Camera access denied!");

    });

}

/* Capture Image & Real-Time Detection */

function captureImage(){

    const canvas = document.getElementById('canvas');

    const result = document.getElementById('result');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');

    ctx.drawImage(video,0,0);

    const imageData = canvas.toDataURL('image/png');

    /* Random AI Prediction Demo */

    const prediction =
    Math.random() > 0.5
    ? "🐶 Dog Detected"
    : "🐱 Cat Detected";

    result.innerHTML = `
        <h2>${prediction}</h2>
        <img src="${imageData}">
    `;

}

/* Auto Start Camera */

startCamera();

</script>

</body>
</html>
